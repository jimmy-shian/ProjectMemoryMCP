# Alembic Configuration for Project Memory MCP

[alembic]
# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Path to migration scripts
script_location = src/project_memory_mcp/db/migrations

# Version locations
version_locations = %(script_location)s/versions

# Don't include the sqlalchemy.url in the generated migrations
# We'll set it programmatically in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Custom section for our project
[project_memory]
# Project root directory (set at runtime)
project_root = .